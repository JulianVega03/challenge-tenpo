services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tenpo_db
      POSTGRES_USER: ${DB_USER:-tenpo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tenpo123}
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tenpo} -d tenpo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tenpo-net

  app:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tenpo}
      DB_PASSWORD: ${DB_PASSWORD:-tenpo123}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tenpo-net

networks:
  tenpo-net:
    driver: bridge

volumes:
  db-data:
